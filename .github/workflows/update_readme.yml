name: Update README Tables and Stats

on:
  push:
    branches:
      - master
    paths:
      - 'solutions/**.py' # L'azione scatta solo se aggiungi/modifichi file Python
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Run Python Script
        run: python update_readme.py
        
      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Tracciamo il README principale e i nuovi README nelle sotto-cartelle
          git add README.md
          git add solutions/easy/README.md
          git add solutions/medium/README.md
          git add solutions/hard/README.md
          
          # Committa solo se ci sono effettivamente cambiamenti
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: auto-update stats and sub-folder tables [skip ci]"
          git push origin master